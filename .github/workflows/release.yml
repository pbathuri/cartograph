name: release
# Publish to PyPI automatically when you push a version tag (e.g. `git tag v0.2.0 && git push --tags`).
# Uses PyPI Trusted Publishing (OIDC) — NO API token stored in GitHub. Configure once on PyPI:
#   pypi.org -> add a GitHub publisher: repo `pbathuri/cartograph`, workflow `release.yml`.
# NOTE: this workflow declares NO GitHub environment, so the PyPI publisher's "Environment name"
# field must be LEFT BLANK for the OIDC claims to match. (If you set an env on PyPI, add the same
# `environment: <name>` under the job below.)

on:
  push:
    tags: ["v*"]

permissions:
  id-token: write          # required for trusted publishing
  contents: read

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check dist/*
      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
