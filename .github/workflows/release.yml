name: release
# Publish to PyPI automatically when you push a version tag (e.g. `git tag v0.2.0 && git push --tags`).
# Uses PyPI Trusted Publishing (OIDC) — NO API token stored in GitHub. Configure once on PyPI:
#   pypi.org -> add a GitHub publisher: repo `pbathuri/cartograph`, workflow `release.yml`.
# NOTE: the PyPI publisher's "Environment name" must EXACTLY match `environment:` below.
# Here both are `pypi`. (Blank on one side + set on the other => OIDC claim mismatch / invalid-publisher.)

on:
  push:
    tags: ["v*"]

permissions:
  id-token: write          # required for trusted publishing
  contents: read

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check dist/*
      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true     # idempotent: re-running a tag never fails on an already-published version
